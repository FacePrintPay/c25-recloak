permissions:
  contents: write
  pages: write
  id-token: write
name: C25 Pages
on:
  push:
    branches: [main]
jobs:
  pages:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
        continue-on-error: true
